<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Streamline — Enterprise Media Catalog">
  <title>Streamline — Enterprise Media Catalog</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- ═══════════════════════════════════════════════════════
       PROFILE SELECTION SCREEN
       ═══════════════════════════════════════════════════════ -->
  <div id="sp" class="active" role="main" aria-label="Profile selection">
    <div class="p-logo">Streamline</div>
    <div class="p-tagline">Enterprise Media Catalog</div>
    <div class="p-who">Select your profile</div>
    <div class="p-grid" id="pgrid" role="list" aria-label="Available profiles"></div>
  </div>


  <!-- ═══════════════════════════════════════════════════════
       HOME SCREEN
       ═══════════════════════════════════════════════════════ -->
  <div id="sh" class="screen" role="main" aria-label="Media catalog home">

    <!-- ── NAVIGATION ── -->
    <nav id="nav" role="navigation" aria-label="Primary navigation">
      <div class="nav-logo" onclick="toTop()" role="link" tabindex="0"
           aria-label="Streamline — go to top"
           onkeydown="if(event.key==='Enter')toTop()">
        Streamline
      </div>

      <div class="nav-links" role="list">
        <span class="nav-link active" role="listitem">Home</span>
        <span class="nav-link" role="listitem" onclick="toast('Section coming soon')">Catalog</span>
        <span class="nav-link" role="listitem" onclick="toast('Section coming soon')">My List</span>
        <span class="nav-link" role="listitem" onclick="toast('Section coming soon')">Updates</span>
      </div>

      <!-- Mood filter pills — enterprise: converted from "vibe" chips to structured filters -->
      <div class="mood-filters" id="mood-filters" role="group" aria-label="Filter by mood"></div>

      <div class="nav-right">
        <!-- Search -->
        <div class="search-wrap" role="search">
          <input
            type="search"
            id="search-input"
            placeholder="Search catalog…"
            aria-label="Search media catalog"
            oninput="onSearch(this.value)"
            onkeydown="onSearchKey(event)"
            autocomplete="off"
          >
          <button class="search-btn" onclick="toggleSearch()" aria-label="Toggle search">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
              <circle cx="6.5" cy="6.5" r="4.5" stroke="currentColor" stroke-width="1.5"/>
              <path d="M10.5 10.5L14 14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
            </svg>
          </button>
        </div>

        <!-- Profile avatar -->
        <div class="nav-avatar" id="nav-avatar" tabindex="0" role="button"
             aria-label="Switch profile"
             onkeydown="if(event.key==='Enter')document.getElementById('nav-avatar').onclick()">
        </div>
      </div>
    </nav>

    <!-- Search results panel -->
    <div id="search-panel" role="region" aria-label="Search results" aria-live="polite"></div>

    <!-- ── HERO ── -->
    <section id="hero" aria-label="Featured title">
      <div class="hero-backdrop" id="hero-backdrop" role="img" aria-label="Hero backdrop"></div>
      <div class="hero-body container">
        <div class="hero-inner" id="hero-content" aria-live="polite"></div>
      </div>
    </section>

    <!-- ── CONTENT ROWS ── -->
    <main id="content" class="container" aria-label="Media catalog rows">
      <div id="rows"></div>
    </main>

    <!-- ── FOOTER ── -->
    <footer role="contentinfo">
      <div class="footer-brand">Streamline</div>
      <div class="footer-note">Front-end mockup &nbsp;·&nbsp; Enterprise Edition &nbsp;·&nbsp; &copy; 2026</div>
    </footer>

  </div><!-- /#sh -->


  <!-- ═══════════════════════════════════════════════════════
       TITLE DETAIL MODAL
       ═══════════════════════════════════════════════════════ -->
  <div id="modal-bg"
       role="dialog"
       aria-modal="true"
       aria-labelledby="modal-title"
       onclick="handleModalBg(event)">
    <div id="modal">
      <!-- Trailer / Backdrop -->
      <div class="modal-hero" id="modal-hero-bg" role="img" aria-label="Title backdrop">
        <button class="modal-close" onclick="closeModal()" aria-label="Close details">✕</button>
      </div>
      <!-- Body -->
      <div class="modal-body">
        <div id="modal-content"></div>
      </div>
    </div>
  </div>


  <!-- ═══════════════════════════════════════════════════════
       VIDEO PLAYER
       ═══════════════════════════════════════════════════════ -->
  <div id="player-screen" role="dialog" aria-modal="true" aria-label="Video player">

    <video id="vid" preload="none" aria-label="Video content"></video>

    <!-- Player UI overlay -->
    <div id="pui" aria-label="Player controls">

      <!-- Top bar -->
      <div class="p-top-bar">
        <button class="p-back-btn" onclick="closePlayer()" aria-label="Exit player">
          <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
            <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Back to catalog
        </button>
        <div class="p-title-bar" id="p-title-bar">Now Playing</div>
      </div>

      <!-- Controls -->
      <div class="p-controls">
        <div class="p-now-playing">Now Playing</div>
        <div class="p-film-title" id="p-film-title"></div>

        <!-- Seek bar -->
        <div class="seek-wrap" id="seek-wrap"
             onclick="seekClick(event)"
             role="slider"
             aria-label="Seek"
             aria-valuemin="0" aria-valuemax="100">
          <div class="seek-fill" id="seek-fill"></div>
          <div class="seek-thumb" id="seek-thumb"></div>
        </div>

        <div class="p-bottom-row">
          <!-- Left controls -->
          <div class="p-left-ctrls">
            <button class="p-btn" onclick="skip(-10)" aria-label="Skip back 10 seconds">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M9 2.5A6.5 6.5 0 1 1 2.5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M2 3.5V7h3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <text x="6.5" y="12" font-size="5" fill="currentColor" text-anchor="middle">10</text>
              </svg>
            </button>

            <button class="p-btn" id="ppbtn" onclick="togglePlay()" aria-label="Play / Pause">▶</button>

            <button class="p-btn" onclick="skip(10)" aria-label="Skip forward 10 seconds">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M9 2.5A6.5 6.5 0 1 0 15.5 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
                <path d="M16 3.5V7h-3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                <text x="11.5" y="12" font-size="5" fill="currentColor" text-anchor="middle">10</text>
              </svg>
            </button>

            <div class="vol-wrap">
              <button class="p-btn" id="mutebtn" onclick="toggleMute()" aria-label="Toggle mute">🔊</button>
              <input type="range" id="volbar"
                     min="0" max="1" step="0.05" value="0.8"
                     oninput="setVol(this.value)"
                     aria-label="Volume">
            </div>

            <span class="p-time">
              <span id="tcur">0:00</span>
              <span aria-hidden="true"> / </span>
              <span id="ttot">0:00</span>
            </span>
          </div>

          <!-- Right controls -->
          <div class="p-right-ctrls">
            <button class="p-btn" onclick="goFS()" aria-label="Toggle fullscreen">
              <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
                <path d="M2 6V2h4M12 2h4v4M16 12v4h-4M6 16H2v-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </button>
          </div>
        </div>
      </div>
    </div><!-- /#pui -->
  </div><!-- /#player-screen -->


  <!-- ═══════════════════════════════════════════════════════
       GLOBAL UTILITIES
       ═══════════════════════════════════════════════════════ -->

  <!-- Mood particle burst overlay -->
  <div id="particles" aria-hidden="true"></div>

  <!-- Toast notifications -->
  <div id="toasts" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="app.js"></script>
</body>
</html>
